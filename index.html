<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NetGuard — Firewall Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0d14;
      --surface:   #111622;
      --card:      #161d2e;
      --border:    #1f2d47;
      --accent:    #00d4ff;
      --accent2:   #0077ff;
      --green:     #00e87a;
      --green-bg:  #00251a;
      --red:       #ff3b5c;
      --red-bg:    #280010;
      --text:      #c8d8f0;
      --muted:     #4a5a7a;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Sora', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 0;
    }

    /* ── BACKGROUND GRID ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; padding: 40px 20px 80px; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 12px;
      display: grid; place-items: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(0,212,255,.3);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header h1 span { color: var(--accent); }
    .subtitle { font-size: 0.78rem; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

    .status-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.72rem; font-family: var(--mono);
      color: var(--green);
      background: rgba(0,232,122,.08);
      border: 1px solid rgba(0,232,122,.2);
      padding: 5px 12px;
      border-radius: 20px;
    }
    .status-pill::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,232,122,.5); }
      50% { opacity: .7; box-shadow: 0 0 0 4px rgba(0,232,122,0); }
    }

    /* ── MAIN GRID ── */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }
    .card-title {
      font-size: 0.68rem;
      font-family: var(--mono);
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title::before {
      content: '';
      display: inline-block;
      width: 3px; height: 12px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ── FORM ── */
    .full-width { grid-column: 1 / -1; }

    .form-row { display: grid; grid-template-columns: 1fr 160px; gap: 12px; margin-bottom: 16px; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

    label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; font-family: var(--mono); }

    input[type="text"], select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,.12);
    }
    select option { background: var(--surface); }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      font-family: var(--sans);
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: .5px;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(0,119,255,.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { opacity: .9; box-shadow: 0 6px 28px rgba(0,119,255,.45); }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* spinner */
    .spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULT BOX ── */
    .result-box {
      display: none;
      border-radius: 12px;
      padding: 20px;
      margin-top: 4px;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }

    .result-box.allowed {
      background: var(--green-bg);
      border: 1px solid rgba(0,232,122,.3);
    }
    .result-box.blocked {
      background: var(--red-bg);
      border: 1px solid rgba(255,59,92,.3);
    }

    .verdict {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 10px;
    }
    .verdict.allowed { color: var(--green); }
    .verdict.blocked { color: var(--red); }

    .verdict-icon { font-size: 1.5rem; }

    .result-detail { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
    .result-detail span { color: var(--text); }

    /* ── STATS CARDS ── */
    .stat-num {
      font-size: 2rem;
      font-weight: 700;
      font-family: var(--mono);
      line-height: 1;
    }
    .stat-num.green { color: var(--green); }
    .stat-num.red   { color: var(--red); }
    .stat-num.blue  { color: var(--accent); }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 6px; font-family: var(--mono); }

    /* ── LIVE LOGS ── */
    .logs-card { grid-column: 1 / -1; }

    #log-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      height: 220px;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.7;
      scroll-behavior: smooth;
    }
    #log-container::-webkit-scrollbar { width: 4px; }
    #log-container::-webkit-scrollbar-track { background: transparent; }
    #log-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .log-entry { display: block; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,.03); }
    .log-time   { color: var(--muted); }
    .log-ip     { color: var(--accent); }
    .log-proto  { color: #a08fff; }
    .log-allow  { color: var(--green); font-weight: 600; }
    .log-block  { color: var(--red); font-weight: 600; }
    .log-reason { color: var(--muted); }

    .empty-log { color: var(--muted); font-size: 0.75rem; text-align: center; padding: 60px 0; }

    /* log controls */
    .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .log-badge {
      font-size: 0.65rem; font-family: var(--mono);
      background: rgba(0,212,255,.1); color: var(--accent);
      border: 1px solid rgba(0,212,255,.2);
      padding: 3px 8px; border-radius: 20px;
    }
    .btn-clear {
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-size: 0.72rem; font-family: var(--mono);
      padding: 4px 10px; border-radius: 6px; cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .btn-clear:hover { color: var(--red); border-color: var(--red); }
  </style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header>
    <div class="logo-icon">🛡️</div>
    <div>
      <h1>Net<span>Guard</span></h1>
      <div class="subtitle">INTRUSION DETECTION &amp; FIREWALL SYSTEM v1.0</div>
    </div>
    <div class="status-pill">SYSTEM ACTIVE</div>
  </header>

  <!-- ROW 1: Input + Stats -->
  <div class="grid">

    <!-- INPUT CARD -->
    <div class="card full-width">
      <div class="card-title">Traffic Inspection</div>
      <div class="form-row">
        <div>
          <label>IP ADDRESS / DOMAIN</label>
          <input type="text" id="ip-input" placeholder="e.g. 192.168.1.1 or example.com" />
        </div>
        <div>
          <label>PROTOCOL</label>
          <select id="protocol-select">
            <option value="TCP">TCP</option>
            <option value="UDP">UDP</option>
            <option value="ICMP">ICMP</option>
          </select>
        </div>
      </div>
      <button class="btn" id="check-btn" onclick="checkTraffic()">
        <span id="btn-text">🔍 Check Traffic</span>
        <span class="spinner" id="spinner"></span>
      </button>

      <!-- RESULT BOX -->
      <div class="result-box" id="result-box">
        <div class="verdict" id="verdict-text"></div>
        <div class="result-detail" id="result-ip"></div>
        <div class="result-detail" id="result-reason"></div>
        <div class="result-detail" id="result-class"></div>
      </div>
    </div>

  </div>

  <!-- ROW 2: Stats -->
  <div class="grid" style="margin-bottom: 20px;">
    <div class="card">
      <div class="card-title">Total Checks</div>
      <div class="stat-num blue" id="stat-total">0</div>
      <div class="stat-label">REQUESTS INSPECTED</div>
    </div>
    <div class="card">
      <div class="card-title">Allowed</div>
      <div class="stat-num green" id="stat-allowed">0</div>
      <div class="stat-label">TRAFFIC PERMITTED</div>
    </div>
    <div class="card">
      <div class="card-title">Blocked</div>
      <div class="stat-num red" id="stat-blocked">0</div>
      <div class="stat-label">THREATS STOPPED</div>
    </div>
    <div class="card">
      <div class="card-title">Block Rate</div>
      <div class="stat-num" id="stat-rate" style="color:var(--accent)">0%</div>
      <div class="stat-label">THREAT PERCENTAGE</div>
    </div>
  </div>

  <!-- LIVE LOGS -->
  <div class="grid">
    <div class="card logs-card">
      <div class="log-header">
        <div class="card-title" style="margin:0">Live Logs</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="log-badge" id="log-count">0 entries</span>
          <button class="btn-clear" onclick="clearLogs()">Clear</button>
        </div>
      </div>
      <div id="log-container">
        <div class="empty-log" id="empty-msg">⬡ No traffic checked yet. Run an inspection above.</div>
      </div>
    </div>
  </div>

</div>

<script>
  let stats = { total: 0, allowed: 0, blocked: 0 };
  let logEntries = [];

  async function checkTraffic() {
    const ip = document.getElementById('ip-input').value.trim();
    const protocol = document.getElementById('protocol-select').value;

    if (!ip) {
      showResult({ status: 'BLOCKED', reason: 'No input provided', ip: '—' }, null);
      return;
    }

    // Loading state
    const btn = document.getElementById('check-btn');
    const btnText = document.getElementById('btn-text');
    const spinner = document.getElementById('spinner');
    btn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'block';

    try {
      const res = await fetch('/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ip, protocol })
      });
      const data = await res.json();
      showResult(data, protocol);
      appendLog(data);
      updateStats(data.status);
    } catch (err) {
      showResult({ status: 'BLOCKED', reason: 'Server unreachable — is Flask running?', ip }, protocol);
    } finally {
      btn.disabled = false;
      btnText.style.display = 'inline';
      spinner.style.display = 'none';
    }
  }

  function showResult(data, protocol) {
    const box = document.getElementById('result-box');
    const verdict = document.getElementById('verdict-text');
    const ipEl = document.getElementById('result-ip');
    const reasonEl = document.getElementById('result-reason');
    const classEl = document.getElementById('result-class');

    const allowed = data.status === 'ALLOWED';

    box.className = 'result-box ' + (allowed ? 'allowed' : 'blocked');
    box.style.display = 'block';

    verdict.className = 'verdict ' + (allowed ? 'allowed' : 'blocked');
    verdict.innerHTML = `<span class="verdict-icon">${allowed ? '✅' : '🚫'}</span>${data.status}: ${data.reason || '—'}`;

    ipEl.innerHTML   = `IP: <span>${data.ip || data.input || '—'}</span>${data.domain ? ` &nbsp;·&nbsp; Domain: <span>${data.domain}</span>` : ''}`;
    reasonEl.innerHTML = `Protocol: <span>${protocol || data.protocol || '—'}</span>`;
    classEl.innerHTML  = data.classification ? `Classification: <span>${data.classification}</span>` : '';
  }

  function appendLog(data) {
    document.getElementById('empty-msg')?.remove();

    const ts = data.timestamp || new Date().toLocaleTimeString();
    const allowed = data.status === 'ALLOWED';

    const entry = document.createElement('span');
    entry.className = 'log-entry';
    entry.innerHTML =
      `<span class="log-time">[${ts}]</span> ` +
      `<span class="log-ip">${data.ip || data.input}</span> ` +
      `<span class="log-reason">(</span><span class="log-proto">${data.protocol || '—'}</span><span class="log-reason">)</span> ` +
      ` → ` +
      `<span class="${allowed ? 'log-allow' : 'log-block'}">${data.status}</span> ` +
      `<span class="log-reason">(${data.reason || '—'})</span>`;

    const container = document.getElementById('log-container');
    container.appendChild(entry);
    container.scrollTop = container.scrollHeight;

    logEntries.push(entry);
    document.getElementById('log-count').textContent = logEntries.length + ' entries';
  }

  function updateStats(status) {
    stats.total++;
    if (status === 'ALLOWED') stats.allowed++;
    else stats.blocked++;

    document.getElementById('stat-total').textContent   = stats.total;
    document.getElementById('stat-allowed').textContent = stats.allowed;
    document.getElementById('stat-blocked').textContent = stats.blocked;
    const rate = stats.total ? Math.round((stats.blocked / stats.total) * 100) : 0;
    document.getElementById('stat-rate').textContent    = rate + '%';
  }

  function clearLogs() {
    const c = document.getElementById('log-container');
    c.innerHTML = '<div class="empty-log" id="empty-msg">⬡ Logs cleared.</div>';
    logEntries = [];
    document.getElementById('log-count').textContent = '0 entries';
  }

  // Allow Enter key to submit
  document.getElementById('ip-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkTraffic();
  });
</script>
</body>
</html>
